# =========================================================
# Starship — Rocko_DE_Final
# Medium: directory, git, language, duration, time
# =========================================================

format = """
$directory\
$git_branch\
$git_status\
$python\
$nodejs\
$rust\
$golang\
$java\
$cmd_duration\
$time\
$status\
$character"""

# ── Directory ────────────────────────────────────────────
[directory]
style = "bold green"
truncation_length = 3
truncate_to_repo = true
read_only = " 󰌾"
read_only_style = "red"

# ── Git ──────────────────────────────────────────────────
[git_branch]
format = "on [$symbol$branch]($style) "
symbol = "⏎ "
style = "bold purple"

[git_status]
format = '([$all_status$ahead_behind]($style) )'
style = "bold red"
ahead = "⇡${count}"
behind = "⇣${count}"
diverged = "⇕⇡${ahead_count}⇣${behind_count}"
modified = "✘${count}"
untracked = "?${count}"
staged = "+${count}"
deleted = "✖${count}"

# ── Languages (only show when in relevant project) ───────
[python]
format = "via [${symbol}${pyenv_prefix}(${version} )]($style)"
symbol = "🐍 "
style = "bold blue"
detect_files = ["requirements.txt", "pyproject.toml", "setup.py", ".python-version"]

[nodejs]
format = "via [$symbol($version )]($style)"
symbol = "E725 "
style = "bold green"
detect_files = ["package.json", ".nvmrc"]

[rust]
format = "via [$symbol($version )]($style)"
symbol = "🦀 "
style = "bold red"

[golang]
format = "via [$symbol($version )]($style)"
symbol = "E725 "
style = "bold cyan"

[java]
format = "via [$symbol($version )]($style)"
symbol = "E725 "
style = "bold red"

# ── Command duration ─────────────────────────────────────
[cmd_duration]
min_time = 2000
format = "took [$duration]($style) "
style = "bold yellow"

# ── Time ─────────────────────────────────────────────────
[time]
disabled = false
format = "[$time]($style) "
time_format = "%H:%M"
style = "dimmed white"

# ── Status / exit code ───────────────────────────────────
[status]
disabled = false
format = "[$symbol]($style) "
symbol = "✗"
style = "bold red"
success_symbol = ""

# ── Prompt character ─────────────────────────────────────
[character]
success_symbol = "[❯](bold blue)"
error_symbol = "[❯](bold red)"
vimcmd_symbol = "[❮](bold green)"

# ── Disabled modules ─────────────────────────────────────
[package]
disabled = true

[aws]
disabled = true

[gcloud]
disabled = true
